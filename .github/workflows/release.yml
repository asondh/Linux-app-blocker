name: Release .deb

# Build the Debian package and attach it to a GitHub Release.
# Triggers (any of):
#   * pushing a version tag (v0.2.0 or V0.2.0 — both cases)
#   * publishing a Release in the GitHub UI
#   * manually from the Actions tab ("Run workflow"), giving an existing tag
on:
  push:
    tags:
      - "v*"
      - "V*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag/release to build and attach the .deb to"
        required: true
        default: "V0.2.0"

permissions:
  contents: write   # needed to upload the .deb to the Release

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build the .deb package
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh

      - name: Show what was built
        run: ls -l dist/

      - name: Attach the .deb to the Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the manual input when present, otherwise the pushed tag.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.deb
